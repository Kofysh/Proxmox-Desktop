name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ProxmoxDesktop.csproj

      - name: Publish
        run: |
          dotnet publish ProxmoxDesktop.csproj `
            -c Release -r win-x64 --self-contained true `
            -o output/ProxmoxDesktop
        shell: pwsh

      - name: ZIP
        run: Compress-Archive -Path output/ProxmoxDesktop/* -DestinationPath output/ProxmoxDesktop-${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: Proxmox Desktop ${{ github.ref_name }}
          body: |
            ## Installation
            1. Télécharger `ProxmoxDesktop-${{ github.ref_name }}-win-x64.zip`
            2. Extraire
            3. Lancer `ProxmoxDesktop.exe`

            > Portable — aucune installation requise.

            ## Prérequis
            - Windows 10 (build 19041+) ou Windows 11
            - [WebView2 Runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/)
          files: output/ProxmoxDesktop-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
