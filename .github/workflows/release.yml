name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/ProxmoxDesktop.App/ProxmoxDesktop.App.csproj

      - name: Update version
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $csproj  = "src/ProxmoxDesktop.App/ProxmoxDesktop.App.csproj"
          (Get-Content $csproj) `
            -replace '<AssemblyVersion>[^<]+</AssemblyVersion>', "<AssemblyVersion>$version.0</AssemblyVersion>" `
            -replace '<InformationalVersion>[^<]+</InformationalVersion>', "<InformationalVersion>$version</InformationalVersion>" `
            | Set-Content $csproj
        shell: pwsh

      - name: Publish application
        run: |
          dotnet publish src/ProxmoxDesktop.App/ProxmoxDesktop.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o output/ProxmoxDesktop
        shell: pwsh

      - name: Create ZIP archive
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive `
            -Path output/ProxmoxDesktop/* `
            -DestinationPath output/ProxmoxDesktop-$tag-win-x64.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Proxmox Desktop ${{ github.ref_name }}
          body: |
            ## Installation

            1. Download `ProxmoxDesktop-${{ github.ref_name }}-win-x64.zip`
            2. Extract the folder anywhere you want
            3. Run `ProxmoxDesktop.exe`

            > No installation required — fully portable application. All WinUI 3 runtime components are bundled.

            ## Requirements
            - Windows 10 (build 19041+) or Windows 11
            - [WebView2 Runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/) if not already installed (Windows 10 only — pre-installed on Windows 11)
          files: output/ProxmoxDesktop-${{ github.ref_name }}-win-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
