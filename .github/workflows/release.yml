name: Build et publication

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restauration des dépendances
        run: dotnet restore src/ProxmoxDesktop.App/ProxmoxDesktop.App.csproj

      - name: Mise à jour de la version
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $csproj  = "src/ProxmoxDesktop.App/ProxmoxDesktop.App.csproj"
          (Get-Content $csproj) `
            -replace '<AssemblyVersion>[^<]+</AssemblyVersion>', "<AssemblyVersion>$version.0</AssemblyVersion>" `
            -replace '<InformationalVersion>[^<]+</InformationalVersion>', "<InformationalVersion>$version</InformationalVersion>" `
            | Set-Content $csproj
        shell: pwsh

      - name: Publication de l'application
        run: |
          dotnet publish src/ProxmoxDesktop.App/ProxmoxDesktop.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o output/ProxmoxDesktop
        shell: pwsh

      - name: Création du ZIP
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive `
            -Path output/ProxmoxDesktop/* `
            -DestinationPath output/ProxmoxDesktop-$tag-win-x64.zip
        shell: pwsh

      - name: Création de la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: Proxmox Desktop ${{ github.ref_name }}
          body: |
            ## Installation

            1. Télécharger `ProxmoxDesktop-${{ github.ref_name }}-win-x64.zip`
            2. Extraire le dossier où tu veux
            3. Lancer `ProxmoxDesktop.exe`

            > Aucune installation requise — application portable.

            ## Prérequis
            - Windows 10 (build 19041+) ou Windows 11
            - [WebView2 Runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/) si non préinstallé (Windows 10 uniquement)
          files: output/ProxmoxDesktop-${{ github.ref_name }}-win-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
