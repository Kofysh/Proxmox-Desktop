name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/ProxmoxDesktop/ProxmoxDesktop.csproj

      - name: Publish application
        run: |
          dotnet publish src/ProxmoxDesktop/ProxmoxDesktop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o output/ProxmoxDesktop
        shell: pwsh

      - name: Create ZIP archive
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive `
            -Path output/ProxmoxDesktop/* `
            -DestinationPath output/ProxmoxDesktop-$tag-win-x64.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Proxmox Desktop ${{ github.ref_name }}
          body: |
            ## Installation
            1. Download `ProxmoxDesktop-${{ github.ref_name }}-win-x64.zip`
            2. Extract anywhere
            3. Run `ProxmoxDesktop.exe`

            > Fully portable — no installation required.

            ## Requirements
            - Windows 10 (build 19041+) or Windows 11
            - [WebView2 Runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/) for console features
          files: output/ProxmoxDesktop-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
