name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore "Proxmox Desktop/ProxmoxDesktop.csproj"

      - name: Build
        shell: pwsh
        run: |
          dotnet build "Proxmox Desktop/ProxmoxDesktop.csproj" `
            --configuration Release `
            --no-restore `
            -p:Platform=x64

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish "Proxmox Desktop/ProxmoxDesktop.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -o output/ProxmoxDesktop

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxmoxDesktop-win-x64
          path: output/ProxmoxDesktop/
          retention-days: 7
