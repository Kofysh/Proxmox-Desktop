name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore "Proxmox Desktop/ProxmoxDesktop.csproj"

      - name: Build (Release x64)
        run: |
          dotnet build "Proxmox Desktop/ProxmoxDesktop.csproj" `
            --configuration Release `
            --no-restore `
            -p:Platform=x64
        shell: pwsh
